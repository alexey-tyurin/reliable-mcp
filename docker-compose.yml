services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  weather-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/entrypoints/weather-mcp.js
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - SERVICE_ROLE=weather-mcp
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  flight-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/entrypoints/flight-mcp.js
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - SERVICE_ROLE=flight-mcp
      - PORT=3002
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/entrypoints/agent.js
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - SERVICE_ROLE=agent
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - WEATHER_MCP_URL=http://weather-mcp:3001/mcp
      - FLIGHT_MCP_URL=http://flight-mcp:3002/mcp
    depends_on:
      redis:
        condition: service_healthy
      weather-mcp:
        condition: service_healthy
      flight-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
